name: Clicker New Life
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: NDK Install
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build Preparation
        run: |
          # Качаем все зависимости (SDL2, Image, Mixer, TTF)
          for lib in SDL2-2.28.5 SDL2_image-2.8.2 SDL2_mixer-2.8.0 SDL2_ttf-2.22.0; do
            URL="https://github.com/libsdl-org/${lib%-*}/releases/download/release-${lib#*-}/${lib}.zip"
            curl -L "$URL" -o "${lib}.zip" && unzip -q "${lib}.zip"
          done

          # Находим папки
          SDL2_DIR=$(find . -maxdepth 1 -type d -name "SDL2-2.28.5")
          IMG_DIR=$(find . -maxdepth 1 -type d -name "SDL2_image*")
          MIX_DIR=$(find . -maxdepth 1 -type d -name "SDL2_mixer*")
          TTF_DIR=$(find . -maxdepth 1 -type d -name "SDL2_ttf*")

          # Создаем структуру проекта
          cp -r "$SDL2_DIR/android-project" ./proj
          mkdir -p ./proj/app/src/main/jni/SDL2 ./proj/app/src/main/jni/SDL2_image ./proj/app/src/main/jni/SDL2_mixer ./proj/app/src/main/jni/SDL2_ttf ./proj/app/src/main/jni/src ./proj/app/src/main/assets

          # Копируем либы в JNI
          cp -r "$SDL2_DIR"/* ./proj/app/src/main/jni/SDL2/
          cp -r "$IMG_DIR"/* ./proj/app/src/main/jni/SDL2_image/
          cp -r "$MIX_DIR"/* ./proj/app/src/main/jni/SDL2_mixer/
          cp -r "$TTF_DIR"/* ./proj/app/src/main/jni/SDL2_ttf/
          
          # Копируем твой код и ассеты
          cp main.cxx ./proj/app/src/main/jni/src/main.cpp
          cp coin.png ./proj/app/src/main/assets/
          cp coin.wav ./proj/app/src/main/assets/
          cp font.ttf ./proj/app/src/main/assets/

          # Android.mk
          cat <<EOF > ./proj/app/src/main/jni/Android.mk
          LOCAL_PATH := \$(call my-dir)
          include \$(LOCAL_PATH)/SDL2/Android.mk
          include \$(LOCAL_PATH)/SDL2_image/Android.mk
          include \$(LOCAL_PATH)/SDL2_mixer/Android.mk
          include \$(LOCAL_PATH)/SDL2_ttf/Android.mk
          include \$(CLEAR_VARS)
          LOCAL_MODULE := main
          LOCAL_SRC_FILES := src/main.cpp
          LOCAL_C_INCLUDES := \$(LOCAL_PATH)/SDL2/include \$(LOCAL_PATH)/SDL2_image \$(LOCAL_PATH)/SDL2_mixer \$(LOCAL_PATH)/SDL2_ttf
          LOCAL_SHARED_LIBRARIES := SDL2 SDL2_image SDL2_mixer SDL2_ttf
          LOCAL_LDLIBS := -lGLESv2 -llog -landroid -lz
          include \$(BUILD_SHARED_LIBRARY)
          EOF

          # Application.mk
          echo "APP_ABI := arm64-v8a
          APP_PLATFORM := android-21
          APP_STL := c++_shared" > ./proj/app/src/main/jni/Application.mk

          # build.gradle (с поправкой путей)
          cat <<EOF > ./proj/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.mygame.clicker"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.mygame.clicker"
                  minSdkVersion 21
                  targetSdkVersion 34
                  externalNativeBuild { ndkBuild { abiFilters 'arm64-v8a' } }
              }
              sourceSets { main { assets.srcDirs = ['src/main/assets'] } }
              externalNativeBuild { ndkBuild { path 'src/main/jni/Android.mk' } }
          }
          EOF

      - name: Build APK
        working-directory: ./proj
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Clicker-Game
          path: proj/app/build/outputs/apk/debug/*.apk
