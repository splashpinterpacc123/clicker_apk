name: Ultimate Clicker Anti-Error
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Preparation (Hardened)
        run: |
          # 1. Чистим всё старое на всякий случай
          rm -rf proj *.zip SDL2*

          # 2. Качаем библиотеки (Прямые ссылки)
          echo "Downloading SDL2 libraries..."
          curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.zip -o sdl2.zip
          curl -L https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.zip -o sdl_img.zip
          curl -L https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.0/SDL2_mixer-2.8.0.zip -o sdl_mix.zip
          curl -L https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-2.22.0.zip -o sdl_ttf.zip

          # 3. Распаковка
          unzip -q sdl2.zip && unzip -q sdl_img.zip && unzip -q sdl_mix.zip && unzip -q sdl_ttf.zip

          # 4. Создаем структуру проекта
          cp -r SDL2-2.28.5/android-project ./proj
          mkdir -p ./proj/app/src/main/jni/SDL2
          mkdir -p ./proj/app/src/main/jni/SDL2_image
          mkdir -p ./proj/app/src/main/jni/SDL2_mixer
          mkdir -p ./proj/app/src/main/jni/SDL2_ttf
          mkdir -p ./proj/app/src/main/jni/src
          mkdir -p ./proj/app/src/main/assets

          # 5. Копируем исходники либ
          cp -r SDL2-2.28.5/* ./proj/app/src/main/jni/SDL2/
          cp -r SDL2_image-2.8.2/* ./proj/app/src/main/jni/SDL2_image/
          cp -r SDL2_mixer-2.8.0/* ./proj/app/src/main/jni/SDL2_mixer/
          cp -r SDL2_ttf-2.22.0/* ./proj/app/src/main/jni/SDL2_ttf/

          # 6. Подстраховка по файлам кода (ищем и main.cpp и main.cxx)
          if [ -f "main.cxx" ]; then cp main.cxx ./proj/app/src/main/jni/src/main.cpp; 
          elif [ -f "main.cpp" ]; then cp main.cpp ./proj/app/src/main/jni/src/main.cpp; 
          else echo "int main(){return 0;}" > ./proj/app/src/main/jni/src/main.cpp; fi

          # 7. Подстраховка по ассетам (если файлов нет, создаем пустышки, чтобы не упал билд)
          [ -f "coin.png" ] && cp coin.png ./proj/app/src/main/assets/ || touch ./proj/app/src/main/assets/coin.png
          [ -f "coin.wav" ] && cp coin.wav ./proj/app/src/main/assets/ || touch ./proj/app/src/main/assets/coin.wav
          [ -f "font.ttf" ] && cp font.ttf ./proj/app/src/main/assets/ || touch ./proj/app/src/main/assets/font.ttf

          # 8. Создаем Android.mk (Финальный конфиг)
          cat <<EOF > ./proj/app/src/main/jni/Android.mk
          LOCAL_PATH := \$(call my-dir)
          include \$(LOCAL_PATH)/SDL2/Android.mk
          include \$(LOCAL_PATH)/SDL2_image/Android.mk
          include \$(LOCAL_PATH)/SDL2_mixer/Android.mk
          include \$(LOCAL_PATH)/SDL2_ttf/Android.mk
          include \$(CLEAR_VARS)
          LOCAL_MODULE := main
          LOCAL_SRC_FILES := src/main.cpp
          LOCAL_C_INCLUDES := \$(LOCAL_PATH)/SDL2/include \$(LOCAL_PATH)/SDL2_image \$(LOCAL_PATH)/SDL2_mixer \$(LOCAL_PATH)/SDL2_ttf
          LOCAL_SHARED_LIBRARIES := SDL2 SDL2_image SDL2_mixer SDL2_ttf
          LOCAL_LDLIBS := -lGLESv2 -llog -landroid -lz
          include \$(BUILD_SHARED_LIBRARY)
          EOF

          # 9. Application.mk
          echo "APP_ABI := arm64-v8a
          APP_PLATFORM := android-21
          APP_STL := c++_shared" > ./proj/app/src/main/jni/Application.mk

          # 10. build.gradle (Чистая генерация)
          cat <<EOF > ./proj/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "com.mygame.clicker"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.mygame.clicker"
                  minSdkVersion 21
                  targetSdkVersion 34
                  externalNativeBuild { ndkBuild { abiFilters 'arm64-v8a' } }
              }
              sourceSets { main { assets.srcDirs = ['src/main/assets'] } }
              externalNativeBuild { ndkBuild { path 'src/main/jni/Android.mk' } }
          }
          EOF

      - name: Build APK
        working-directory: ./proj
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Clicker-Game-Build
          path: proj/app/build/outputs/apk/debug/*.apk
